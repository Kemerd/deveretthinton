    <title>D Everett Hinton - Portfolio</title>

    <style>
        /* Prevent white flash on page load - apply background color immediately */
        html, body {
            margin: 0;
            padding: 0;
            background-color: #0C1014;
            /* Subtle fade to transparent - just a few frames for polish */
            transition: background-color 0.15s ease-out;
        }

        /* Fade out blue background when loaded */
        body.loaded {
            background-color: transparent;
        }

        /* Root element starts slightly blurred, shows content immediately */
        #root {
            filter: blur(8px);
            transition: filter 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Remove blur when images are loaded */
        #root.loaded {
            filter: blur(0px);
        }
    </style>
</head>

<body>
    <noscript>You need to enable JavaScript to run this app.</noscript>

    <div id="root"></div>

    <script>
        // Unblur as soon as the handful of above-the-fold images are ready,
        // instead of window 'load' — that event waits on EVERY resource
        // (the background video, all carousel photos, fonts...), which was
        // stalling the reveal for 5-10 seconds on cold caches.
        (function () {
            // The only pixels visible through the blur at first paint:
            // the page background photo and the first two skills-card images.
            const CRITICAL_IMAGES = [
                '/img/bg.jpg',
                '/img/skills/fullstack1.jpg',
                '/img/skills/ml1.jpg',
            ];

            // Hard ceiling — if the network is slow (or a path 404s), reveal
            // anyway after half a second rather than leaving the page frosted.
            const MAX_WAIT_MS = 500;

            let revealed = false;
            function reveal() {
                if (revealed) return; // run once, whichever trigger fires first
                revealed = true;
                document.getElementById('root')?.classList.add('loaded');
                document.body.classList.add('loaded');
            }

            // Resolve on load OR error — a broken image must not hold the page
            const settle = (src) => new Promise((resolve) => {
                const img = new Image();
                img.onload = img.onerror = resolve;
                img.src = src;
            });

            Promise.all(CRITICAL_IMAGES.map(settle)).then(reveal);
            setTimeout(reveal, MAX_WAIT_MS);
        })();
    </script>
</body>

</html>
