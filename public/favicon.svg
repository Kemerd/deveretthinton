<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
    <!--
        Simplified American flag favicon.
        A true 13-stripe / 50-star flag turns to mush at 16-32px,
        so this uses the classic favicon simplification:
        7 stripes (4 red, 3 white) + a blue canton with a 3-2-3 dot field.
        Colors are the traditional Old Glory values.
    -->

    <!-- Red field: stripes 1, 3, 5, 7 show through from this base rect -->
    <rect width="32" height="32" fill="#B22234"/>

    <!-- White stripes: rows 2, 4, 6 (each stripe is 32/7 ≈ 4.571 units tall) -->
    <g fill="#FFFFFF">
        <rect y="4.571" width="32" height="4.571"/>
        <rect y="13.714" width="32" height="4.571"/>
        <rect y="22.857" width="32" height="4.571"/>
    </g>

    <!-- Blue canton: spans the top 4 stripes and ~47% of the width -->
    <rect width="15" height="18.286" fill="#3C3B6E"/>

    <!-- Star field: 3-2-3 staggered dots (circles read better than stars at tab size) -->
    <g fill="#FFFFFF">
        <circle cx="3"    cy="3.6"  r="1.5"/>
        <circle cx="7.5"  cy="3.6"  r="1.5"/>
        <circle cx="12"   cy="3.6"  r="1.5"/>
        <circle cx="5.25" cy="9.14" r="1.5"/>
        <circle cx="9.75" cy="9.14" r="1.5"/>
        <circle cx="3"    cy="14.7" r="1.5"/>
        <circle cx="7.5"  cy="14.7" r="1.5"/>
        <circle cx="12"   cy="14.7" r="1.5"/>
    </g>
</svg>
