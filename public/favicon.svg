<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
    <!--
        Simplified American flag favicon.
        A true 13-stripe / 50-star flag turns to mush at 16-32px,
        so this uses the classic favicon simplification:
        7 stripes (4 red, 3 white) + a blue canton with a 3-2-3 dot field.
        Colors are the traditional Old Glory values.

        The flag keeps its official 19:10 aspect ratio (32 wide x 16.842 tall)
        and is centered vertically, leaving the top and bottom transparent.
    -->

    <!-- Red field: stripes 1, 3, 5, 7 show through from this base rect -->
    <rect y="7.579" width="32" height="16.842" fill="#B22234"/>

    <!-- White stripes: rows 2, 4, 6 (each stripe is 16.842/7 ≈ 2.406 units tall) -->
    <g fill="#FFFFFF">
        <rect y="9.985"  width="32" height="2.406"/>
        <rect y="14.797" width="32" height="2.406"/>
        <rect y="19.609" width="32" height="2.406"/>
    </g>

    <!-- Blue canton: spans the top 4 stripes and 40% of the flag length -->
    <rect y="7.579" width="12.8" height="9.624" fill="#3C3B6E"/>

    <!-- Star field: 3-2-3 staggered dots (circles read better than stars at tab size) -->
    <g fill="#FFFFFF">
        <circle cx="2.18"  cy="9.985"  r="1"/>
        <circle cx="6.4"   cy="9.985"  r="1"/>
        <circle cx="10.62" cy="9.985"  r="1"/>
        <circle cx="4.29"  cy="12.391" r="1"/>
        <circle cx="8.51"  cy="12.391" r="1"/>
        <circle cx="2.18"  cy="14.797" r="1"/>
        <circle cx="6.4"   cy="14.797" r="1"/>
        <circle cx="10.62" cy="14.797" r="1"/>
    </g>
</svg>
